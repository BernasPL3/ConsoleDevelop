name: ConsoleDevelop Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install py2app
        run: |
          python -m pip install --upgrade pip
          pip install py2app

      - name: Build ConsoleDevelop
        run: |
          python setup.py py2app

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ConsoleDevelop
          path: dist/
